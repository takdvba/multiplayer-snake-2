<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        /* Menu Screen */
        .menu-screen {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .menu-screen.hidden {
            display: none;
        }

        .menu-screen h2 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 20px;
        }

        .difficulty-section {
            text-align: left;
        }

        .difficulty-section h3 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2em;
        }

        .difficulty-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .difficulty-btn {
            padding: 20px;
            font-size: 1.1em;
            border: 3px solid #ddd;
            background: white;
            color: #333;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .difficulty-btn.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: scale(1.05);
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        /* Game Screen */
        .game-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .game-screen.hidden {
            display: none;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .player-info {
            text-align: center;
            min-width: 200px;
        }

        .player-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .player-label.player1 {
            color: #FF6B6B;
        }

        .player-label.player2 {
            color: #4ECDC4;
        }

        .score {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .score.player1 {
            color: #FF6B6B;
        }

        .score.player2 {
            color: #4ECDC4;
        }

        .win-condition {
            font-size: 0.85em;
            color: #999;
        }

        .divider {
            height: 40px;
            width: 2px;
            background: #ddd;
        }

        canvas {
            border: 4px solid white;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            display: block;
        }

        .controls {
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            max-width: 900px;
        }

        .controls h3 {
            margin-bottom: 15px;
        }

        .player-controls {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .control-group {
            text-align: center;
        }

        .control-group h4 {
            color: #FFD93D;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .control-group p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        /* Game Over Screen */
        .game-over-screen {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .game-over-screen.hidden {
            display: none;
        }

        .winner-announcement {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .winner-announcement.player1 {
            color: #FF6B6B;
        }

        .winner-announcement.player2 {
            color: #4ECDC4;
        }

        .final-scores {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .final-scores strong {
            font-size: 1.5em;
        }

        .play-again-btn {
            padding: 20px 60px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .play-again-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        @media (max-width: 768px) {
            .menu-screen {
                min-width: 90vw;
                padding: 40px;
            }

            .header h1 {
                font-size: 2em;
            }

            .difficulty-options {
                grid-template-columns: 1fr;
            }

            .game-info {
                flex-direction: column;
                gap: 15px;
            }

            .divider {
                width: 100%;
                height: 1px;
            }

            canvas {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 MULTIPLAYER SNAKE 🐍</h1>
            <p>Competitive gameplay with stunning graphics</p>
        </div>

        <!-- Menu Screen -->
        <div class="menu-screen" id="menuScreen">
            <div>
                <h2>Select Win Condition</h2>
                <div class="difficulty-section">
                    <h3>Points needed to win:</h3>
                    <div class="difficulty-options">
                        <button class="difficulty-btn" data-points="50">50 Points</button>
                        <button class="difficulty-btn" data-points="100">100 Points</button>
                        <button class="difficulty-btn" data-points="150">150 Points</button>
                        <button class="difficulty-btn" data-points="200">200 Points</button>
                    </div>
                </div>
            </div>
            <button class="start-btn" id="startBtn">Start Game</button>
        </div>

        <!-- Game Screen -->
        <div class="game-screen hidden" id="gameScreen">
            <div class="game-info">
                <div class="player-info">
                    <div class="player-label player1">Player 1 (Arrow Keys)</div>
                    <div class="score player1" id="score1">0</div>
                    <div class="win-condition" id="winCondition"></div>
                </div>
                <div class="divider"></div>
                <div class="player-info">
                    <div class="player-label player2">Player 2 (WASD)</div>
                    <div class="score player2" id="score2">0</div>
                    <div class="win-condition">to win</div>
                </div>
            </div>

            <canvas id="gameCanvas" width="900" height="600"></canvas>

            <div class="controls">
                <h3>🎮 Controls</h3>
                <div class="player-controls">
                    <div class="control-group">
                        <h4>Player 1 (Red)</h4>
                        <p>↑ ↓ ← → Arrow Keys</p>
                    </div>
                    <div class="control-group">
                        <h4>Player 2 (Cyan)</h4>
                        <p>W A S D Keys</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over-screen hidden" id="gameOverScreen">
            <div>
                <div class="winner-announcement" id="winnerAnnouncement"></div>
                <div class="final-scores" id="finalScores"></div>
            </div>
            <button class="play-again-btn" id="playAgainBtn">Play Again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
